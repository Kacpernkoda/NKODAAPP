name: nkoda_app
description: "NKODA Europe MVP - Ekskluzywne folie ochronne PPF"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.4.1
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.0
  image_picker: ^1.2.1
  http: ^1.6.0
  google_maps_flutter: ^2.5.3
  google_maps_flutter_web: ^0.5.4+2
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
